<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="aO" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#FF9900"/></marker>
    <marker id="aP" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#8C4FFF"/></marker>
    <marker id="aT" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#01A88D"/></marker>
    <marker id="aR" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#DD344C"/></marker>
    <marker id="aD" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#232F3E"/></marker>
  </defs>

  <rect x="0" y="0" width="1400" height="1000" fill="#FFFFFF"/>
  <text x="48" y="36" font-size="22" font-weight="bold" fill="#232F3E">Aegis MCP Authorization Gateway — Auth &amp; Approval Flow</text>
  <text x="1352" y="36" font-size="13" fill="#DD344C" text-anchor="end">red = deny paths (fail closed)</text>

  <!-- Lifelines -->
  <line x1="110"  y1="120" x2="110"  y2="905" stroke="#879196" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="300"  y1="120" x2="300"  y2="905" stroke="#879196" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="490"  y1="120" x2="490"  y2="905" stroke="#879196" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="700"  y1="120" x2="700"  y2="905" stroke="#879196" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="910"  y1="120" x2="910"  y2="905" stroke="#879196" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="1110" y1="120" x2="1110" y2="905" stroke="#879196" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="1300" y1="120" x2="1300" y2="905" stroke="#879196" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- Actor headers -->
  <rect x="25" y="56" width="170" height="64" rx="8" fill="#232F3E"/>
  <text x="110" y="83" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">User /</text>
  <text x="110" y="101" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">agent client</text>

  <rect x="215" y="56" width="170" height="64" rx="8" fill="#8C4FFF"/>
  <text x="300" y="83" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Identity Provider</text>
  <text x="300" y="101" font-size="12" fill="#FFFFFF" text-anchor="middle">Cognito · federated · MFA</text>

  <rect x="405" y="56" width="170" height="64" rx="8" fill="#232F3E"/>
  <text x="490" y="83" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">API Gateway</text>
  <text x="490" y="101" font-size="12" fill="#FFFFFF" text-anchor="middle">JWT authorizer</text>

  <rect x="615" y="56" width="170" height="64" rx="8" fill="#232F3E"/>
  <text x="700" y="83" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">MCP Authorization</text>
  <text x="700" y="101" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Gateway</text>

  <rect x="825" y="56" width="170" height="64" rx="8" fill="#01A88D"/>
  <text x="910" y="83" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Human Approver</text>
  <text x="910" y="101" font-size="12" fill="#FFFFFF" text-anchor="middle">separation of duties</text>

  <rect x="1025" y="56" width="170" height="64" rx="8" fill="#232F3E"/>
  <text x="1110" y="92" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Tool / Connector</text>

  <rect x="1215" y="56" width="170" height="64" rx="8" fill="#232F3E"/>
  <text x="1300" y="83" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Audit Store</text>
  <text x="1300" y="101" font-size="12" fill="#FFFFFF" text-anchor="middle">DynamoDB + S3 WORM</text>

  <!-- 1 authenticate -->
  <text x="205" y="152" font-size="12.5" fill="#8C4FFF" text-anchor="middle">1 · Authenticate (username + MFA)</text>
  <line x1="110" y1="160" x2="293" y2="160" stroke="#8C4FFF" stroke-width="2" marker-end="url(#aP)"/>
  <!-- 2 JWT -->
  <text x="205" y="188" font-size="12.5" fill="#8C4FFF" text-anchor="middle">2 · Short-lived JWT (RS256)</text>
  <line x1="300" y1="196" x2="117" y2="196" stroke="#8C4FFF" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aP)"/>
  <!-- 3 request -->
  <text x="300" y="228" font-size="12.5" fill="#232F3E" text-anchor="middle">3 · Tool request + Bearer JWT</text>
  <line x1="110" y1="236" x2="483" y2="236" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <!-- deny: 401 -->
  <text x="300" y="266" font-size="12.5" font-weight="bold" fill="#DD344C" text-anchor="middle">× Missing / invalid JWT → 401 Unauthorized</text>
  <line x1="490" y1="274" x2="117" y2="274" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aR)"/>
  <!-- 4 forward -->
  <text x="595" y="306" font-size="12.5" fill="#232F3E" text-anchor="middle">4 · Authenticated request</text>
  <line x1="490" y1="314" x2="693" y2="314" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <!-- 5 verify note -->
  <rect x="500" y="336" width="400" height="28" rx="6" fill="#FFFFFF" stroke="#232F3E" stroke-width="1.5"/>
  <text x="700" y="355" font-size="12" fill="#232F3E" text-anchor="middle">5 · Verify JWT signature via JWKS (iss · aud · exp)</text>
  <!-- 6 policy note -->
  <rect x="500" y="376" width="400" height="28" rx="6" fill="#FFFFFF" stroke="#232F3E" stroke-width="1.5"/>
  <text x="700" y="395" font-size="12" fill="#232F3E" text-anchor="middle">6 · Policy: grant ∩ entitlement — deny-by-default (Cedar / AVP)</text>
  <!-- deny: 403 unregistered -->
  <text x="405" y="432" font-size="12.5" font-weight="bold" fill="#DD344C" text-anchor="middle">× Tool not registered / no grant → DENY 403 (fail closed)</text>
  <line x1="700" y1="440" x2="117" y2="440" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aR)"/>
  <!-- 7 approval request -->
  <text x="805" y="474" font-size="12.5" fill="#01A88D" text-anchor="middle">7 · Consequential action → approval</text>
  <text x="805" y="490" font-size="12.5" fill="#01A88D" text-anchor="middle">request (bound to tool + args)</text>
  <line x1="700" y1="498" x2="903" y2="498" stroke="#01A88D" stroke-width="2" marker-end="url(#aT)"/>
  <!-- 8 approval -->
  <text x="805" y="526" font-size="12.5" fill="#01A88D" text-anchor="middle">8 · Bound single-use approval</text>
  <text x="805" y="542" font-size="12.5" fill="#01A88D" text-anchor="middle">(approver ≠ requester)</text>
  <line x1="910" y1="550" x2="707" y2="550" stroke="#01A88D" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aT)"/>
  <!-- deny: self approval -->
  <text x="405" y="580" font-size="12.5" font-weight="bold" fill="#DD344C" text-anchor="middle">× Self-approval (approver = requester) → 403</text>
  <line x1="700" y1="588" x2="117" y2="588" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aR)"/>
  <!-- deny: replay -->
  <text x="405" y="616" font-size="12.5" font-weight="bold" fill="#DD344C" text-anchor="middle">× Replayed / expired approval → 404</text>
  <line x1="700" y1="624" x2="117" y2="624" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aR)"/>
  <!-- 9 mint note -->
  <rect x="500" y="646" width="400" height="28" rx="6" fill="#FFFFFF" stroke="#232F3E" stroke-width="1.5"/>
  <text x="700" y="665" font-size="12" fill="#232F3E" text-anchor="middle">9 · Mint scoped per-call token (one tool · args hash · short TTL)</text>
  <!-- 10 invoke -->
  <text x="905" y="700" font-size="12.5" fill="#232F3E" text-anchor="middle">10 · Invoke tool with scoped token</text>
  <line x1="700" y1="708" x2="1103" y2="708" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <!-- 11 re-verify note -->
  <rect x="955" y="730" width="310" height="28" rx="6" fill="#FFFFFF" stroke="#232F3E" stroke-width="1.5"/>
  <text x="1110" y="749" font-size="12" fill="#232F3E" text-anchor="middle">11 · Re-verify scoped token (aud = tool · single use)</text>
  <!-- deny: tool 401 -->
  <text x="905" y="782" font-size="12.5" font-weight="bold" fill="#DD344C" text-anchor="middle">× Missing / invalid scoped token → 401</text>
  <line x1="1110" y1="790" x2="707" y2="790" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aR)"/>
  <!-- 12 result -->
  <text x="905" y="814" font-size="12.5" fill="#232F3E" text-anchor="middle">12 · Result</text>
  <line x1="1110" y1="822" x2="707" y2="822" stroke="#232F3E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aD)"/>
  <!-- 13 audit -->
  <text x="1000" y="848" font-size="12.5" fill="#232F3E" text-anchor="middle">13 · Masked, append-only audit write — fail-closed (no audit → no action)</text>
  <line x1="700" y1="856" x2="1293" y2="856" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <!-- 14 response -->
  <text x="405" y="880" font-size="12.5" fill="#232F3E" text-anchor="middle">14 · Response (via API Gateway)</text>
  <line x1="700" y1="888" x2="117" y2="888" stroke="#232F3E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aD)"/>

  <!-- Legend -->
  <line x1="64" y1="948" x2="112" y2="948" stroke="#FF9900" stroke-width="2" marker-end="url(#aO)"/>
  <text x="122" y="953" font-size="12" fill="#232F3E">Governed call</text>
  <line x1="240" y1="948" x2="288" y2="948" stroke="#8C4FFF" stroke-width="2" marker-end="url(#aP)"/>
  <text x="298" y="953" font-size="12" fill="#232F3E">Identity / token issuance</text>
  <line x1="470" y1="948" x2="518" y2="948" stroke="#01A88D" stroke-width="2" marker-end="url(#aT)"/>
  <text x="528" y="953" font-size="12" fill="#232F3E">Human approval (SoD)</text>
  <line x1="690" y1="948" x2="738" y2="948" stroke="#232F3E" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aD)"/>
  <text x="748" y="953" font-size="12" fill="#232F3E">Response</text>
  <line x1="850" y1="948" x2="898" y2="948" stroke="#DD344C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#aR)"/>
  <text x="908" y="953" font-size="12" fill="#232F3E">Deny path (fail closed)</text>
</svg>

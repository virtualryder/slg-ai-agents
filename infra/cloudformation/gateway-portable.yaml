AWSTemplateFormatVersion: "2010-09-09"
Description: >
  SLG Suite - MCP gateway SCAFFOLDING (PORTABLE path: API Gateway HTTP API + Cognito JWT
  authorizer). Any region incl. GovCloud. NOTE: the fully wired gateway (access logging,
  throttling, Lambda invoke permission, smoke test) ships in infra/golden-path-311/ (SAM).
  WAF is applied at the CloudFront edge (edge.yaml) since WAFv2 does not associate to HTTP APIs.
  The dynamic POST /tool/{kind}/{method} route is constrained by the deny-by-default
  TOOL_REGISTRY allowlist in platform_core (unknown tools are denied before any connector runs).
Parameters:
  AgentId: {Type: String, Default: 01-resident-services-311}
  Environment: {Type: String, Default: dev}
  UserPoolId: {Type: String}
  UserPoolClientId: {Type: String}
  ConnectorFnArn: {Type: String}
Resources:
  GatewayApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "slg-${AgentId}-${Environment}-gateway"
      ProtocolType: HTTP
  JwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref GatewayApi
      AuthorizerType: JWT
      IdentitySource: ["$request.header.Authorization"]
      Name: cognito-jwt
      JwtConfiguration:
        Audience: [!Ref UserPoolClientId]
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}"
  ToolIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref GatewayApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Ref ConnectorFnArn
      PayloadFormatVersion: "2.0"
  ToolRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref GatewayApi
      RouteKey: "POST /tool/{kind}/{method}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${ToolIntegration}"
  GatewayAccessLogs:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub "/slg/${AgentId}/${Environment}/gateway-access"
      RetentionInDays: 365
  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref GatewayApi
      StageName: !Ref Environment
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt GatewayAccessLogs.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","route":"$context.routeKey","status":"$context.status","sub":"$context.authorizer.claims.sub"}'
      DefaultRouteSettings:
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10
  ConnectorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ConnectorFnArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${GatewayApi}/*"
Outputs:
  GatewayUrl: {Value: !Sub "https://${GatewayApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"}

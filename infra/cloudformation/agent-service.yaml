AWSTemplateFormatVersion: "2010-09-09"
Description: >
  SLG Suite - Agent service SCAFFOLDING (native Step Functions+Lambda HITL gate | container).
  NOTE: the state machine below is a PLACEHOLDER. For the fully wired, deployable agent (real
  Lambdas + ASL + gateway + Cognito JWT + access logging/throttling + smoke test), use the SAM
  golden path at infra/golden-path-311/ (`sam build && sam deploy`). The other agents follow that
  same pattern. See docs/REPO-REVIEW-AND-REMEDIATION-PLAN.md (P1).
Parameters:
  AgentId: {Type: String, Default: 01-resident-services-311}
  Environment: {Type: String, Default: dev}
  DeployMode: {Type: String, Default: native, AllowedValues: [native, container]}
  AgentRoleArn: {Type: String}
Conditions:
  IsNative: !Equals [!Ref DeployMode, native]
Resources:
  AgentStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Condition: IsNative
    Properties:
      StateMachineName: !Sub "slg-${AgentId}-${Environment}"
      RoleArn: !Ref AgentRoleArn
      DefinitionString: |
        {"Comment":"PLACEHOLDER - deploy the real agent via infra/golden-path-311 (SAM). See P1.",
         "StartAt":"Done","States":{"Done":{"Type":"Pass","End":true}}}
Outputs:
  Mode: {Value: !Ref DeployMode}

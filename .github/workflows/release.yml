name: Release

# On a version tag (v*), re-run the hard gates, generate an SBOM, and publish a GitHub Release
# whose notes are the matching CHANGELOG section. The integration workflow (ephemeral AWS) is
# run separately/manually before tagging since it needs cloud credentials.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the release

jobs:
  gate:
    name: Hard gates (tests + cfn-lint + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e platform_core
          pip install pytest cryptography cfn-lint bandit
      - name: Unit tests
        run: PYTHONPATH=platform_core:. python -m pytest platform_core/tests governance/tests -q
      - name: cfn-lint
        run: cfn-lint --ignore-checks E3006 infra/cloudformation/*.yaml infra/golden-path-*/template.yaml
      - name: Bandit (high severity)
        run: bandit -r platform_core governance aws-native-reference -lll

  release:
    name: Publish release + SBOM
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: SBOM (CycloneDX)
        run: |
          pip install -e platform_core cryptography cyclonedx-bom
          cyclonedx-py environment --output-format JSON --outfile sbom.cdx.json
      - name: Extract CHANGELOG section for this tag
        run: |
          python - "$GITHUB_REF_NAME" > RELEASE_NOTES.md <<'PY'
          import re, sys
          tag = sys.argv[1].lstrip("v")
          txt = open("CHANGELOG.md", encoding="utf-8").read()
          secs = re.split(r"(?m)^## ", txt)
          body = next((s for s in secs if s.lstrip().startswith(f"[{tag}]")), "")
          print("## " + body.strip() if body else f"Release {sys.argv[1]}")
          PY
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: sbom.cdx.json

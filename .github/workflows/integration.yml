name: Integration (ephemeral AWS)

# Deploys a real golden path to an ephemeral stack, runs the AUTHENTICATED-API negative tests
# (unauthorized-tool-denied, write-needs-approval, allowed-read, reviewer single-use replay,
# fixture-created, audit-exists), then ALWAYS tears the stack down. Manual / gated because it
# needs AWS credentials. Requires repo secret AWS_OIDC_ROLE_ARN (an IAM role this workflow
# assumes via GitHub OIDC) with permissions to deploy SAM + run the tests.
on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region
        default: us-east-1
      agent:
        description: golden path directory under infra/
        default: golden-path-311

permissions:
  id-token: write   # OIDC -> assume AWS_OIDC_ROLE_ARN
  contents: read

concurrency: integration-${{ github.ref }}

jobs:
  deploy-test-teardown:
    name: deploy -> authenticated negative tests -> teardown
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      STACK: slg-it-${{ github.run_id }}
      REGION: ${{ inputs.region }}
      APP_DIR: infra/${{ inputs.agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.region }}
      - name: SAM build + deploy (ephemeral)
        working-directory: ${{ env.APP_DIR }}
        run: |
          sam build
          sam deploy --stack-name "$STACK" --region "$REGION" \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --resolve-s3 --no-confirm-changeset --no-fail-on-empty-changeset \
            --parameter-overrides "TokenSecret=ci-${{ github.run_id }}-not-for-production"
      - name: Install test deps
        run: |
          python -m pip install -U pip
          pip install -e platform_core
          pip install pytest boto3 pycognito
      - name: Authenticated-API negative tests
        env:
          SLG_STACK: ${{ env.STACK }}
          AWS_REGION: ${{ inputs.region }}
        run: PYTHONPATH=platform_core:. python -m pytest tests/integration -m integration -q
      - name: Tear down (always)
        if: always()
        working-directory: ${{ env.APP_DIR }}
        run: sam delete --stack-name "$STACK" --region "$REGION" --no-prompts || true

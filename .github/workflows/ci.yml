name: CI

# Security + quality gate for the SLG agentic-AI accelerator.
# Hard gates: unit tests, cfn-lint, bandit (high severity). Advisory (soft-fail on
# first adoption, then tighten): semgrep, pip-audit, checkov. Plus secret scan + SBOM.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Unit tests (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e platform_core
          pip install pytest cryptography
      - name: Run control-plane + governance tests
        run: PYTHONPATH=platform_core:. python -m pytest platform_core/tests governance/tests -q

  evals:
    # Scored output-quality gate for the hero pilot — Agent 01 (Resident Services / 311).
    # Runs the labeled NYC-311 benchmark against thresholds (complaint-type accuracy,
    # entity F1, duplicate accuracy, grounding, PII-leak = 0 hard gate, field
    # completeness). Deterministic, no API key. Fails the build on regression;
    # publishes eval-report-311.md as an artifact for the assurance packet.
    name: Scored eval — Agent 01 / 311 (no API key)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e platform_core
          pip install pytest
      - name: Scored eval — gate on thresholds
        run: PYTHONPATH=platform_core:. python -m governance.evals.score_311
      - name: Scored eval tests (gate + negative controls)
        run: PYTHONPATH=platform_core:. python -m pytest governance/evals -q -p no:cacheprovider
      - name: Publish eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent01-311-eval-report
          path: governance/evals/eval-report-311.md
          if-no-files-found: warn

  iac-lint:
    name: IaC lint (cfn-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cfn-lint
      # E3006 = "resource type not in region": false-positive for global (CloudFront)
      # and newer (BedrockAgentCore) types; scoped out here, not a real defect.
      - name: cfn-lint
        run: cfn-lint --ignore-checks E3006 infra/cloudformation/*.yaml infra/golden-path-*/template.yaml

  python-security:
    name: Python SAST + deps (bandit, pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      - name: Bandit (high severity, hard gate)
        run: bandit -r platform_core governance aws-native-reference -lll
      - name: pip-audit (advisory)
        run: pip-audit || echo "::warning::pip-audit reported advisories (advisory gate)"

  semgrep:
    name: Semgrep SAST (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Semgrep (owasp + python)
        run: semgrep --config p/python --config p/owasp-top-ten --error || echo "::warning::semgrep findings (advisory gate)"

  iac-security:
    name: IaC security (checkov, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install checkov
      - name: Checkov (soft-fail; tighten as findings are triaged)
        run: checkov -d infra --quiet --soft-fail

  secret-scan:
    name: Secret scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -e platform_core cryptography
          pip install cyclonedx-bom
      - name: Generate SBOM
        run: cyclonedx-py environment --output-format JSON --outfile sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
